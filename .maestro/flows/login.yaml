# Any credentials land on the Home dashboard.
appId: com.frame.zero
---
- launchApp:
    clearState: true
- assertVisible:
    id: "sign-in:submit"
- tapOn:
    id: "sign-in:email"
- inputText: "demo@framezero.app"
- tapOn:
    id: "sign-in:password"
- inputText: "password"
- tapOn:
    id: "sign-in:submit"
- assertVisible:
    id: "dashboard:greeting"
