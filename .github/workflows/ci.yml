name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

# `changes` gates every build job on whether the push/PR touches anything that
# can affect the build. Docs-only changes (**/*.md, docs/**) can't break
# ktlint/detekt, compilation, unit tests, screenshot goldens, or the release
# APK, so the jobs are skipped (zero runner minutes) when `code` is 'false'.
# Job-level gating (not workflow-level `paths-ignore`) makes the jobs report as
# "skipped" rather than hanging "pending", which is required-status-check safe.
jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `code` matches any changed file that is NOT docs/markdown; a
          # docs-only change leaves it 'false', skipping all build jobs.
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt

  check:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build, ktlint, detekt, unit tests
        run: ./gradlew check -x lint

  screenshot-tests:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Verify screenshot goldens
        run: ./gradlew :composeApp:shared:design_system:verifyRoborazziDebug
      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: '**/build/outputs/roborazzi/'

  release-config:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FRAMEZERO_API_BASE_URL: https://api.framezero.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Generate release BuildKonfig
        run: ./gradlew :shared:generateBuildKonfig -Pbuildkonfig.flavor=release
      - name: Assert release flags
        run: |
          GENERATED=shared/build/generated/source/buildkonfig/commonMain/com/frame/zero/core/network/BuildKonfig.kt
          grep -q 'DEBUG: Boolean = false' "$GENERATED" || { echo "DEBUG is not false in release config"; exit 1; }
          grep -q 'BASE_URL: String = "https://' "$GENERATED" || { echo "BASE_URL is not https in release config"; exit 1; }
      - name: Assemble release APK
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: '**/build/outputs/apk/release/*.apk'
          if-no-files-found: warn
