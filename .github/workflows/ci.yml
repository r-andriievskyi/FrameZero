name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Exposed to the composite setup action (.github/actions/setup-build), which
# decodes it into composeApp/google-services.json.
env:
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

jobs:
  # Fast-fail gate: formatting + static analysis only, no compile of tests or
  # release artifacts. Keeps a broken format/lint from paying for the heavy jobs.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt

  # Compile + unit tests for every module (server included; iOS targets are
  # skipped automatically on Linux). Runs only once lint is green, and primes the
  # Gradle cache that the downstream jobs restore.
  build:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Build and check
        run: ./gradlew check -x ktlintCheck -x detekt

  # Goldens are recorded on macOS; Robolectric Native Graphics renders
  # consistently across hosts, so verification runs on Linux. If this job ever
  # drifts on fonts alone, re-record the goldens from CI.
  screenshot-tests:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Verify screenshot goldens
        run: ./gradlew :composeApp:shared:design_system:verifyRoborazziDebug
      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: '**/build/outputs/roborazzi/'

  # Asserts a release artifact can never ship dev config: BuildKonfig must
  # resolve DEBUG=false and an https BASE_URL, and the minified release APK
  # must assemble. The URL below is a placeholder for the config check only —
  # real release builds supply the production URL.
  release-config:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FRAMEZERO_API_BASE_URL: https://api.framezero.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Generate release BuildKonfig
        run: ./gradlew :shared:generateBuildKonfig -Pbuildkonfig.flavor=release
      - name: Assert release flags
        run: |
          GENERATED=shared/build/generated/source/buildkonfig/commonMain/com/frame/zero/core/network/BuildKonfig.kt
          grep -q 'DEBUG: Boolean = false' "$GENERATED" || { echo "DEBUG is not false in release config"; exit 1; }
          grep -q 'BASE_URL: String = "https://' "$GENERATED" || { echo "BASE_URL is not https in release config"; exit 1; }
      - name: Assemble release APK
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: '**/build/outputs/apk/release/*.apk'
          if-no-files-found: warn
