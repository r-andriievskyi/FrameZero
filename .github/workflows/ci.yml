name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
  GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt

  check:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build, ktlint, detekt, unit tests
        run: ./gradlew check -x lint
      - name: Coverage summary
        if: always()
        run: |
          echo "## Unit test coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ./gradlew :koverLog | grep -i 'coverage' >> "$GITHUB_STEP_SUMMARY" || echo "no coverage data" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  screenshot-tests:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Verify screenshot goldens
        run: ./gradlew :composeApp:shared:design_system:verifyRoborazziAndroidHostTest
      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: '**/build/outputs/roborazzi/'

  ios-build:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: ./.github/actions/setup-build
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-
      - name: Build iOS app (Debug, simulator)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  android-release-build:
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FRAMEZERO_API_BASE_URL: https://api.framezero.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Generate release BuildKonfig
        run: ./gradlew :shared:generateBuildKonfig -Pbuildkonfig.flavor=release
      - name: Assert release flags
        run: |
          GENERATED=shared/build/generated/source/buildkonfig/commonMain/com/frame/zero/core/network/BuildKonfig.kt
          grep -q 'DEBUG: Boolean = false' "$GENERATED" || { echo "DEBUG is not false in release config"; exit 1; }
          grep -q 'BASE_URL: String = "https://' "$GENERATED" || { echo "BASE_URL is not https in release config"; exit 1; }
      - name: Assemble release APK
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: '**/build/outputs/apk/release/*.apk'
          if-no-files-found: warn
