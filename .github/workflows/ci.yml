name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Exposed to the composite setup action (.github/actions/setup-build), which
# decodes it into composeApp/google-services.json.
env:
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

# A fast `lint` gate (ktlint + detekt, no full compile) runs first; the three
# heavy jobs `needs: lint` and then run in parallel with each other. A lint
# failure short-circuits before any expensive compile/test/assemble runs, so we
# don't burn runner minutes on the long jobs for a formatting/static-analysis
# break. On a passing run, wall-clock ≈ lint (~2m) + the longest heavy job, since
# the heavy three overlap. `check` is the sole cache writer (on main).
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt

  # compile + unit tests for every module (server included; iOS targets are
  # skipped automatically on Linux). Android Lint is excluded (-x lint): ktlint
  # /detekt cover style/static analysis (re-run here cheaply via the build cache),
  # and release packaging is proven by release-config. ktlint can't be cleanly
  # stripped from `check` (it wires per-source-set tasks directly), so it repeats
  # the gate's ktlint/detekt — near-free on a warm cache, and a thorough backstop.
  check:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build, ktlint, detekt, unit tests
        run: ./gradlew check -x lint

  screenshot-tests:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Verify screenshot goldens
        run: ./gradlew :composeApp:shared:design_system:verifyRoborazziDebug
      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: '**/build/outputs/roborazzi/'

  # Asserts a release artifact can never ship dev config: BuildKonfig must
  # resolve DEBUG=false and an https BASE_URL, and the minified release APK
  # must assemble. The URL below is a placeholder for the config check only —
  # real release builds supply the production URL.
  release-config:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FRAMEZERO_API_BASE_URL: https://api.framezero.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build
      - name: Generate release BuildKonfig
        run: ./gradlew :shared:generateBuildKonfig -Pbuildkonfig.flavor=release
      - name: Assert release flags
        run: |
          GENERATED=shared/build/generated/source/buildkonfig/commonMain/com/frame/zero/core/network/BuildKonfig.kt
          grep -q 'DEBUG: Boolean = false' "$GENERATED" || { echo "DEBUG is not false in release config"; exit 1; }
          grep -q 'BASE_URL: String = "https://' "$GENERATED" || { echo "BASE_URL is not https in release config"; exit 1; }
      - name: Assemble release APK
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: '**/build/outputs/apk/release/*.apk'
          if-no-files-found: warn
